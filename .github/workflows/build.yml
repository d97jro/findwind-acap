---
name: Build

on: push

jobs:
  build_acap:
    name: Build ACAP packages
    runs-on: ubuntu-latest

    env:
      DEBIAN_FRONTEND: noninteractive
      ZIG_GLOBAL_CACHE_DIR: /tmp/zig-cache
      ZIG_LOCAL_CACHE_DIR: /tmp/zig-local-cache
      SCCACHE_DIR: /tmp/sccache

    strategy:
      matrix:
        # Build both with Docker and Podman
        builder: ["docker", "podman"]

    steps:
      - uses: actions/checkout@v6

      - name: Install sccache
        run: |
          cargo install sccache

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            /tmp/zig-cache
            /tmp/zig-local-cache
            /tmp/sccache
          key: build-cache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Start sccache
        run: |
          sccache --start-server

      # Test all Makefile targets and make sure the ACAP files are created
      - name: Build
        env:
          RUSTC_WRAPPER: sccache
        run: make -j ${{ matrix.builder }}build

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Verify
        run: |
          for f in *.eap; do
          echo "Verification of $f:"
          tar tzf "$f"
          done

      - name: Clean
        run: |
          make clean
          echo 'Make sure no ACAP files are left:'
          [ -z "$(ls ./*.eap ./*LICENSE.txt)" ]
